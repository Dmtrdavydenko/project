<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аутентификация пользователя</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef2f7;
            padding: 20px;
        }

        .auth-box {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1f4f82;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccd3db;
            border-radius: 8px;
            font-size: 15px;
        }

            input:focus {
                outline: none;
                border-color: #1f4f82;
            }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #1f4f82;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

            .btn:hover {
                background: #16395d;
            }

        .message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="auth-box">

        <div class="title">
            Вход в систему
        </div>

        <!--<div class="subtitle">
            Аутентификация пользователя
        </div>-->

        <form id="loginForm">

            <div class="form-group">
                <label>Логин</label>
                <input type="text"
                       id="login"
                       placeholder="Введите логин"
                       required>
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <input type="password"
                       id="password"
                       placeholder="Введите пароль"
                       required>
            </div>

            <button class="btn" type="submit">
                Войти
            </button>

        </form>

        <div class="message" id="message"></div>

    </div>

    <script>const form = document.getElementById("loginForm");

form.addEventListener("submit", async function(event){

    event.preventDefault();

    const login = document.getElementById("login").value;
    const password = document.getElementById("password").value;

    try{

        const response = await fetch("/api/login", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                login: login,
                password: password
            })

        });

        const result = await response.json();
        console.log(result);
        document.getElementById("message").innerText =
            result.message || "Успешно";

    }
    catch(error){

        document.getElementById("message").innerText =
            "Ошибка соединения с сервером";

        console.error(error);
    }

});</script>

</body>
</html>

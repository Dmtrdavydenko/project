<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профиль</title>
    <link rel="stylesheet" href="../css/forms.css" />
    <script src="../js/profile.js" defer></script>
</head>

<body>
    <div class="form-block">
        <div id="profile" class="form-title">
            Профиль X
        </div>

        <form id="user" class="form-grid">
            <div class="label">Идентификатор</div>
            <input id="id" type="number" disabled>

            <div class="label">ФИО</div>
            <input id="fio" type="text">

            <div class="label">Дата рождения</div>
            <input id="birthDate" type="date">

            <div class="label">Отправить</div>
            <button id="btnSend" class="btn" type="submit" style="padding: 9px; white-space: pre-wrap; cursor: pointer;"></button>

        </form>
    </div>
    <div class="form-block">
        <div class="form-title">
            Права
        </div>
        <div id="permission" class="form-grid">
        </div>
    </div>
    <div class="form-block">
        <div class="form-title">
            Роли пользователей
        </div>
        <div id="userRole" class="form-grid">
        </div>
    </div>
    <div class="form-block">
        <div class="form-title">
            Пользователи
        </div>
        <div id="users" class="form-grid">
        </div>
    </div>
    <div class="form-block">
        <form id="quit" class="form-grid">
            <div class="label">Выход</div>
            <button id="btnQuit" class="btn" type="submit" style="padding: 9px; white-space: pre-wrap; cursor: pointer;"></button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeboard (Viewer)</title>
</head>
<body>
    <h2>Codeboard (Viewer)</h2>
    <div id="canvas-container"></div>

    <script>
        const container = document.getElementById("canvas-container");
        const protocol = location.protocol === "https:" ? "wss" : "ws";

        function connect() {
            const ws = new WebSocket(`${protocol}://${location.host}/?role=viewer`);

            ws.onopen = () => console.log("Viewer WS открыт");

            ws.onmessage = (event) => {
                container.innerHTML = event.data;
            };

            ws.onclose = () => {
                console.log("Viewer WS закрыт → reconnect через 1 сек");
                setTimeout(connect, 1000);
            };
        }

        connect();
    </script>
</body>
</html>

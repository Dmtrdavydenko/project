<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codeboard</title>
</head>
<body>

    <div id="board"></div>

    <script>
        let ws;

        function connect() {
            const protocol = location.protocol === "https:" ? "wss" : "ws";
            ws = new WebSocket(`${protocol}://${location.host}`);

            ws.onopen = () => console.log("WS открыт");

            ws.onmessage = (event) => {
                document.getElementById("board").innerHTML = event.data;
            };

            ws.onclose = () => {
                console.log("WS закрыт → reconnect");
                setTimeout(connect, 1000);
            };
        }

        connect();
    </script>

</body>
</html>

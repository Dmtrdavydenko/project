<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer</title>
</head>
<body>
    <h2>Viewer</h2>
    <canvas id="c" width="600" height="200"></canvas>
    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        function connect() {
            const protocol = location.protocol === "https:" ? "wss" : "ws";
            const ws = new WebSocket(`${protocol}://${location.host}/?role=viewer`);

            ws.onopen = () => console.log("Viewer WS открыт");

            ws.onmessage = (event) => {
                const html = event.data;
                // Создаём временный элемент и вставляем canvas
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = html;
                const newCanvas = tempDiv.querySelector("canvas");
                if (newCanvas) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(newCanvas, 0, 0);
                }
            };

            ws.onclose = () => {
                console.log("Viewer WS закрыт → reconnect через 1 сек");
                setTimeout(connect, 1000);
            };
        }

        connect();
    </script>
</body>
</html>

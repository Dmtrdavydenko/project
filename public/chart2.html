<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Loom Statistics</title>

    <style>

        body {
            font-family: Arial;
            background: #f3f4f6;
            margin: 0;
            padding: 30px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,.08);
        }

            .card h2 {
                margin-top: 0;
                margin-bottom: 20px;
                font-size: 20px;
            }

        .chart-wrap {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="dashboard">

        <div class="card">
            <h2>Warp • количество ленты</h2>
            <div id="warp-count"></div>
        </div>

        <div class="card">
            <h2>Weft • количество ленты</h2>
            <div id="weft-count"></div>
        </div>

        <div class="card">
            <h2>Warp • длина ленты</h2>
            <div id="warp-length"></div>
        </div>

        <div class="card">
            <h2>Weft • длина ленты</h2>
            <div id="weft-length"></div>
        </div>

    </div>

    <script>
    class CircularChart {

            constructor({
                container,
                data,
                size = 260,
                radius = 90,
                strokeWidth = 34,
                centerText = ''
            }) {

                this.container = container;
                this.data = data;

                this.size = size;
                this.radius = radius;
                this.strokeWidth = strokeWidth;
                this.centerText = centerText;

                this.circumference =
                    2 * Math.PI * radius;

                this.colors = [
                    '#3b82f6',
                    '#10b981',
                    '#f59e0b',
                    '#ef4444',
                    '#8b5cf6',
                    '#06b6d4',
                    '#84cc16',
                    '#ec4899',
                    '#f97316',
                    '#14b8a6',
                    '#eab308',
                    '#0ea5e9'
                ];
            }

            total() {

                return this.data.reduce(
                    (sum, item) => sum + item.value,
                    0
                );
            }

            percent(value) {

                return (
                    value / this.total()
                ) * 100;
            }

            createSVG() {

                const svgNS =
                    'http://www.w3.org/2000/svg';

                const svg =
                    document.createElementNS(svgNS, 'svg');

                svg.setAttribute('width', this.size);
                svg.setAttribute('height', this.size);

                const center = this.size / 2;

                const group =
                    document.createElementNS(svgNS, 'g');

                group.setAttribute(
                    'transform',
                    `rotate(-90 ${center} ${center})`
                );

                let offset = 0;

                this.data.forEach((item, index) => {

                    const percent =
                        this.percent(item.value);

                    const dash =
                        (percent / 100) *
                        this.circumference;

                    const circle =
                        document.createElementNS(svgNS, 'circle');

                    circle.setAttribute('cx', center);
                    circle.setAttribute('cy', center);
                    circle.setAttribute('r', this.radius);

                    circle.setAttribute('fill', 'none');

                    circle.setAttribute(
                        'stroke',
                        this.colors[index % this.colors.length]
                    );

                    circle.setAttribute(
                        'stroke-width',
                        this.strokeWidth
                    );

                    circle.setAttribute(
                        'stroke-dasharray',
                        `${dash} ${this.circumference - dash}`
                    );

                    circle.setAttribute(
                        'stroke-dashoffset',
                        -offset
                    );

                    offset += dash;

                    group.appendChild(circle);
                });

                svg.appendChild(group);

                const text =
                    document.createElementNS(svgNS, 'text');

                text.setAttribute('x', center);
                text.setAttribute('y', center);

                text.setAttribute('text-anchor', 'middle');

                text.setAttribute(
                    'dominant-baseline',
                    'middle'
                );

                text.setAttribute(
                    'font-size',
                    '18'
                );

                text.setAttribute(
                    'font-weight',
                    'bold'
                );

                text.textContent = this.centerText;

                svg.appendChild(text);

                return svg;
            }

            createLegend() {

                const legend =
                    document.createElement('div');

                this.data.forEach((item, index) => {

                    const row =
                        document.createElement('div');

                    row.className = 'legend-row';

                    const color =
                        document.createElement('div');

                    color.className = 'legend-color';

                    color.style.background =
                        this.colors[index % this.colors.length];

                    const percent =
                        this.percent(item.value)
                            .toFixed(1);

                    const text =
                        document.createElement('div');

                    text.innerHTML =
                        `<b>${item.label}</b><br>
                     ${item.value.toLocaleString()}
                     (${percent}%)`;

                    row.appendChild(color);
                    row.appendChild(text);

                    legend.appendChild(row);
                });

                return legend;
            }

            render() {

                const wrap =
                    document.createElement('div');

                wrap.className = 'chart-wrap';

                wrap.appendChild(
                    this.createSVG()
                );

                wrap.appendChild(
                    this.createLegend()
                );

                this.container.appendChild(wrap);
            }
        }

        /* =========================================
           ДАННЫЕ ИЗ SQL
        ========================================= */

        /* WARP количество */

        const warpCountData = [

            { label: '90 белая нет', value: 15118 },
            { label: '90 белая светостаб', value: 3546 },
            { label: '105 белая светостаб', value: 1574 },
            { label: '140 цветная', value: 8600 },
            { label: '220 белая', value: 2308 }

        ];

        /* WEFT количество */

        const weftCountData = [

            { label: '90 белая нет', value: 1436.5 },
            { label: '90 белая светостаб', value: 248.2 },
            { label: '105 белая светостаб', value: 174 },
            { label: '140 цветная', value: 302 },
            { label: '220 белая', value: 95 }

        ];

        /* WARP длина */

        const warpLengthData = [

            { label: '90 белая нет', value: 31352358.10 },
            { label: '90 белая светостаб', value: 6797216.59 },
            { label: '105 белая светостаб', value: 3001372.70 },
            { label: '140 цветная', value: 15975550.80 },
            { label: '220 белая', value: 3795792.19 }

        ];

        /* WEFT длина */

        const weftLengthData = [

            { label: '90 белая нет', value: 25139099.99 },
            { label: '90 белая светостаб', value: 4644268.34 },
            { label: '105 белая светостаб', value: 2891230.70 },
            { label: '140 цветная', value: 15660725.28 },
            { label: '220 белая', value: 4999656.96 }

        ];

        /* =========================================
           RENDER
        ========================================= */

        new CircularChart({
            container:
                document.getElementById('warp-count'),

            centerText: 'Warp Qty',

            data: warpCountData
        }).render();


        new CircularChart({
            container:
                document.getElementById('weft-count'),

            centerText: 'Weft Qty',

            data: weftCountData
        }).render();


        new CircularChart({
            container:
                document.getElementById('warp-length'),

            centerText: 'Warp M',

            data: warpLengthData
        }).render();


        new CircularChart({
            container:
                document.getElementById('weft-length'),

            centerText: 'Weft M',

            data: weftLengthData
        }).render();</script>
</body>
</html>

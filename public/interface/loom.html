<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Общий блок использования ленты на станках</title>
    <link rel="stylesheet" href="../css/loom.css">
    <link rel="stylesheet" href="../css/selectButton.css">
    <link rel="stylesheet" href="../css/selectFind.css">
    <link rel="stylesheet" href="../css/selectTape.css">
    <link rel="stylesheet" href="../css/chart.css">
    <script src="../js/loom.js" defer></script>
    <script src="../js/chart.js" defer></script>
    <!--<script src="/loomSample.js" defer></script>-->
</head>
<body>

    <nav>
        <a href="/">Назад</a>
        <a href="/textile">Текстиль</a>
    </nav>

    <div class="main-content">
        <div class="zone" id="leftZone">
            <div class="half" id="leftTop"></div>
            <div class="half" id="leftSecond"></div>
            <div class="half" id="leftThird"></div>
            <div class="half" id="leftBottom"></div>
        </div>
        <div class="zone" id="rightZone">
            <div class="half" id="rightTop"></div>
            <div class="half" id="rightSecond"></div>
            <div class="half" id="rightThird"></div>
            <div class="half" id="rightBottom"></div>
        </div>
    </div>

    <div id="footerBlock"></div>

    <div class="dashboard">

        <div class="card">
            <h2>Основа</h2>
            <div class="grid-warp"></div>
        </div>

        <div class="card">
            <h2>Уток</h2>
            <div class="grid-weft"></div>
        </div>

        <div class="card">
            <h2>Основа количество ленты</h2>
            <div id="warp-count"></div>
        </div>

        <div class="card">
            <h2>Уток количество ленты</h2>
            <div id="weft-count"></div>
        </div>

        <div class="card">
            <h2>Основа длина ленты</h2>
            <div id="warp-length"></div>
        </div>

        <div class="card">
            <h2>Уток длина ленты</h2>
            <div id="weft-length"></div>
        </div>

    </div>
</body>
</html>

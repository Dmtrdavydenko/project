<!DOCTYPE html>
<html>
<head>
    <title>Viewer</title>
</head>
<body>

    <div id="app"></div>

    <script>

        const protocol =
            location.protocol === 'https:'
                ? 'wss:'
                : 'ws:';

        const ws = new WebSocket(
            `${protocol}//${location.host}`
        );

        ws.onopen = () => {
            console.log('websocket connected');
        };

        ws.onerror = (error) => {
            console.error('websocket error', error);
        };

        ws.onmessage = (event) => {

            try {

                const data = JSON.parse(event.data);

                if (data.type === 'canvas-code') {

                    // ВАЖНО:
                    // код сам создаёт canvas и вставляет в DOM
                    new Function(data.code)();

                }

            } catch (error) {

                console.error('render error', error);

            }
        };

    </script>

</body>
</html>

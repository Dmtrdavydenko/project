<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3 колонки × 5 строк</title>
    <link rel="stylesheet" href="css/castomTime.css" />
    <style>
        table {
            border-collapse: collapse;
        }

        td {
            border: 1px solid #ccc;
            /*            padding: 10px;*/
        }

        button {
            width: 40px;
            height: 30px;
        }

        .active {
            background-color: lightgreen;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(14, 60px);
            gap: 5px;
        }

        button {
            width: 60px;
            height: 25px;
        }

        .active {
            background-color: lightgreen;
        }


        #controls {
            display: grid;
            grid-template-columns: repeat(14, 60px);
            gap: 5px;
            margin-bottom: 10px;
        }

        .control {
            display: flex;
            flex-direction: column;
        }

            .control input {
/*                width: 60px;*/
                margin-bottom: 2px;
                font-size: 9pt;
                height: 17px;
            }

        #schedule {
            display: grid;
            /*            grid-template-columns: repeat(3, 60px);*/
            grid-template-columns: repeat(1, 46px);
            gap: 5px;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="controls"></div>
    <div id="grid"></div>
    <div style="margin-bottom:10px;">
        <input type="time" id="startTime" value="08:00">
        <!--<button onclick="startPlayback()">▶ Старт</button>-->
    </div>
    <div id="schedule"></div>
    <script>

        //        const interval = columnData[col].time;

        //        if (!interval) return;

        //        result.push(
        //            `${currentTime} → кнопка ${index + 1} (колонка ${col + 1}, ${interval} мин)`
        //        );
        //    });

        //    container.innerHTML = result.join("<br>");
        //}
        document.getElementById("startTime").addEventListener("change", () => {

            updateSchedule();
        })
        function updateSchedule() {
            const container = document.getElementById("schedule");
            container.innerHTML = "";

            const buttons = Array.from(document.querySelectorAll("#grid button"));

            const activeButtons = buttons
                .map((btn, i) => ({ btn, i }))
                .filter(item => active.has(item.i));

            activeButtons.sort((a, b) => a.i - b.i);

            let valueAsNumber = document.getElementById("startTime").valueAsNumber;
            let currentTime = document.getElementById("startTime").value || "08:00";

            let result = [`<div>🟢 ${currentTime} старт</div>`];

            activeButtons.forEach((item, index) => {
                const col = item.i % cols;
                const interval = columnData[col].time;

                if (!interval || interval <= 0) return;
                console.log(interval);
                currentTime = addMinutes(currentTime, interval);

                result.push(
                    `<div id="event-${index}">
        ${currentTime} → шаг ${index + 1} (колонка ${col + 1}, ${interval} мин)
      </div>`
                );
                const input = document.createElement("input");
                input.type = "time";
                valueAsNumber = valueAsNumber + interval;
                input.valueAsNumber = valueAsNumber;
                container.append(input);
            });

            //container.innerHTML = result.join("");
        }
        function createControls() {
            const container = document.getElementById("controls");

            for (let c = 0; c < cols; c++) {
                const div = document.createElement("div");
                div.className = "control";

                const speed = document.createElement("input");
                speed.name = "speed";
                speed.placeholder = "Скорость";

                const length = document.createElement("input");
                length.name = "length";
                length.placeholder = "Длина";

                const time = document.createElement("input");
                time.naem = "time";
                time.placeholder = "Время";
                time.type = "time";

                // события
                speed.addEventListener("input", () => {
                    //if (columnData[c].speed <= 0) return;
                    columnData[c].speed = parseFloat(speed.value) || 0;

                    if (columnData[c].length) {
                        columnData[c].time = columnData[c].length / columnData[c].speed || 0;
                        time.value = columnData[c].time.toFixed(2);
                        updateSchedule();
                    }
                });

                length.addEventListener("input", () => {
                    columnData[c].length = parseFloat(length.value) || 0;

                    if (columnData[c].speed) {
                        columnData[c].time = columnData[c].length / columnData[c].speed * 60000;
                        //time.value = columnData[c].time.toFixed(2);
                        time.valueAsNumber = columnData[c].time
                        updateSchedule();
                    }
                });

                time.addEventListener("input", () => {
                    console.log(time.valueAsNumber);
                    //columnData[c].time = parseFloat(time.value) || 0;
                    columnData[c].time = time.valueAsNumber / 60000 || 0;

                    if (columnData[c].speed) {
                        columnData[c].length = columnData[c].speed * columnData[c].time;
                        length.value = columnData[c].length
                        updateSchedule();
                    }
                });

                div.appendChild(speed);
                div.appendChild(length);
                div.appendChild(time);

                container.appendChild(div);
            }
        }
        let timer = null;

        function startPlayback() {
            if (timer) clearInterval(timer);

            const buttons = Array.from(document.querySelectorAll("#grid button"));

            const activeButtons = buttons
                .map((btn, i) => ({ btn, i }))
                .filter(item => active.has(item.i));

            activeButtons.sort((a, b) => a.i - b.i);

            let index = 0;

            function nextStep() {
                // очистить подсветку
                document.querySelectorAll("#schedule div").forEach(el => {
                    el.style.background = "";
                });

                if (index >= activeButtons.length) {
                    clearInterval(timer);
                    return;
                }

                const item = activeButtons[index];
                const col = item.i % cols;
                const interval = columnData[col].time;

                // подсветка
                const el = document.getElementById(`event-${index}`);
                if (el) el.style.background = "lightgreen";

                index++;

                return interval * 1000; // ⚠️ сейчас 1 минута = 1 секунда (для теста)
            }

            function run() {
                const delay = nextStep();
                if (delay) {
                    timer = setTimeout(run, delay);
                }
            }

            run();
        }
        function addMinutes(time, minutes) {
            let [h, m] = time.split(":").map(Number);
            let total = h * 60 + m + minutes;

            let newH = Math.floor(total / 60);
            let newM = total % 60;

            return `${String(newH).padStart(2, "0")}:${String(newM).padStart(2, "0")}`;
        }
        let startTime = "08:00";
        const rows = 25;
        const cols = 14;
        const columnData = Array.from({ length: cols }, () => ({
            speed: 0,
            length: 0,
            time: 0
        }));

        let active = new Set();

        // создаём grid
        function createGrid() {
            const grid = document.getElementById("grid");

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const btn = document.createElement("button");

                    btn.textContent = "0";
                    btn.dataset.row = r;
                    btn.dataset.col = c;

                    btn.addEventListener("click", () => toggle(btn));

                    grid.appendChild(btn);
                }
            }
        }

        // переключение
        function toggle(btn) {
            const buttons = Array.from(document.querySelectorAll("#grid button"));
            const index = buttons.indexOf(btn);
            const row = Number(btn.dataset.row);

            // найти все кнопки строки
            const rowIndexes = buttons
                .map((_, i) => i)
                .filter(i => Math.floor(i / cols) === row);

            if (active.has(index)) {
                active.delete(index);
                btn.classList.remove("active");
            } else {
                // очистить строку
                rowIndexes.forEach(i => {
                    if (active.has(i)) {
                        active.delete(i);
                        buttons[i].classList.remove("active");
                    }
                });

                active.add(index);
                btn.classList.add("active");
            }

            updateNumbers();
            updateSchedule();
        }

        // нумерация по колонкам
        function updateNumbers() {
            const buttons = Array.from(document.querySelectorAll("#grid button"));

            const columns = Array.from({ length: cols }, () => []);

            buttons.forEach((btn, i) => {
                const row = Math.floor(i / cols);
                const col = i % cols;

                if (active.has(i)) {
                    columns[col].push({ row, btn });
                }
            });

            // сортировка сверху вниз
            columns.forEach(col => {
                col.sort((a, b) => a.row - b.row);
            });

            // сброс
            buttons.forEach(btn => btn.textContent = "0");

            // нумерация
            columns.forEach(col => {
                col.forEach((item, index) => {
                    item.btn.textContent = index + 1;
                });
            });
        }

        // запуск
        createControls();
        createGrid();
        updateSchedule();
    </script>

</body>

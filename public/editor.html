<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor</title>
</head>
<body>
    <h2>Code Editor (Writer)</h2>
<textarea id="code" style="width:600px;height:200px;" placeholder="Пиши код здесь"></textarea>

    <script>
        let ws;

        function connect() {
            const protocol = location.protocol === "https:" ? "wss" : "ws";
            ws = new WebSocket(`${protocol}://${location.host}/?role=writer`);

            ws.onopen = () => console.log("Writer WS открыт");
            ws.onclose = () => {
                console.log("Writer WS закрыт, reconnect через 1 сек");
                setTimeout(connect, 1000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.error) alert(data.error);
            };
        }

        connect();

        const textarea = document.getElementById("code");
        let timeout;
        textarea.addEventListener("input", () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(textarea.value);
                }
            }, 200);
        });
    </script>
</body>
</html>

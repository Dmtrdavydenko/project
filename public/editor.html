<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Main</title>
</head>

<body>
<textarea id="code" placeholder="Пиши код здесь"></textarea>

    <script>
        let ws;
        function connectWS() {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${protocol}://${location.host}/ws`);

            ws.onopen = () => console.log('WebSocket открыт');
            ws.onclose = () => {
                console.log('WebSocket закрыт, переподключаемся через 1 сек...');
                setTimeout(connectWS, 1000);
            };
        }
        connectWS();
        let timeout;
        let textarea = document.getElementById('code');

        textarea.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                // Отправка только если WebSocket открыт
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(textarea.value);
                } else {
                    console.warn('WebSocket закрыт, сообщение не отправлено');
                }
            }, 200);
        });

    </script>
</body>

</html>
